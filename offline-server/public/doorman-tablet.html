<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>B.O.B. Doorman Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }

  /* PIN Screen */
  #pinScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .pin-logo { font-size: 3rem; margin-bottom: 8px; }
  .pin-title { color: #ffd700; font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .pin-subtitle { color: #6060a0; font-size: 0.85rem; margin-bottom: 32px; }
  .pin-dots { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
  .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #3a3a5a; background: transparent; transition: all 0.15s; }
  .pin-dot.filled { background: #ffd700; border-color: #ffd700; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-btn { background: #1a1a3e; border: 1px solid #2a2a5a; border-radius: 12px; color: #e0e0e0; font-size: 1.5rem; font-weight: 600; padding: 20px; cursor: pointer; transition: all 0.1s; user-select: none; }
  .pin-btn:active { background: #2a2a5a; transform: scale(0.95); }
  .pin-btn.del { font-size: 1.1rem; color: #f87171; }
  .pin-error { color: #f87171; font-size: 0.85rem; margin-top: 16px; min-height: 20px; }

  /* Scanner Screen */
  #scanScreen { display: none; flex-direction: column; min-height: 100vh; }
  .scan-header { background: #1a1a3e; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a5a; }
  .scan-header h1 { color: #ffd700; font-size: 1rem; font-weight: 700; }
  .mode-tabs { display: flex; gap: 4px; padding: 8px 16px; background: #0e0e24; flex-wrap: wrap; }
  .mode-tab { flex: 1; min-width: 70px; padding: 8px 4px; border-radius: 8px; border: 1px solid #2a2a5a; background: transparent; color: #8080a0; font-size: 0.7rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
  .mode-tab.active { background: #ffd700; color: #0a0a1a; border-color: #ffd700; }
  .camera-container { position: relative; flex: 1; background: #000; overflow: hidden; min-height: 300px; }
  #video { width: 100%; height: 100%; object-fit: cover; }
  .scan-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 240px; height: 240px; border: 3px solid rgba(255, 215, 0, 0.8); border-radius: 16px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); }
  .scan-hint { color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-top: 16px; text-align: center; }
  .result-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .result-overlay.show { opacity: 1; }
  .result-overlay.success { background: rgba(0, 80, 0, 0.92); }
  .result-overlay.denied { background: rgba(80, 0, 0, 0.92); }
  .result-overlay.already { background: rgba(80, 60, 0, 0.92); }
  .result-overlay.disabled { background: rgba(60, 30, 0, 0.92); }
  .result-icon { font-size: 5rem; margin-bottom: 16px; }
  .result-name { color: #fff; font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .result-msg { color: rgba(255,255,255,0.8); font-size: 1rem; text-align: center; }
  .manual-section { padding: 12px 16px; background: #0e0e24; border-top: 1px solid #1a1a3a; }
  .manual-input { display: flex; gap: 8px; }
  .manual-input input { flex: 1; background: #1a1a3e; border: 1px solid #2a2a5a; border-radius: 8px; color: #e0e0e0; padding: 10px 12px; font-size: 0.9rem; }
  .manual-input button { background: #ffd700; color: #0a0a1a; border: none; border-radius: 8px; padding: 10px 16px; font-weight: 700; cursor: pointer; }
  .lock-btn { background: #2a1a1a; border: 1px solid #4a2a2a; border-radius: 8px; color: #f87171; font-size: 0.8rem; padding: 6px 12px; cursor: pointer; }
</style>
</head>
<body>

<!-- PIN Screen -->
<div id="pinScreen">
  <div class="pin-logo">🎳</div>
  <div class="pin-title">B.O.B. Doorman Scanner</div>
  <div class="pin-subtitle">Enter PIN to unlock</div>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <div></div>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Scanner Screen -->
<div id="scanScreen">
  <div class="scan-header">
    <h1>🎳 B.O.B. Doorman Scanner</h1>
    <button class="lock-btn" onclick="lockScanner()">🔒 Lock</button>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-bowling" onclick="setMode('bowling')">🎳 Bowling</button>
    <button class="mode-tab" id="tab-banquet" onclick="setMode('banquet')">🍽️ Banquet</button>
    <button class="mode-tab" id="tab-pool" onclick="setMode('pool')">🏊 Pool Party</button>
    <button class="mode-tab" id="tab-guest-pool" onclick="setMode('guest-pool')">🎟️ Guest Pass</button>
  </div>
  <div class="camera-container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="scan-overlay">
      <div class="scan-frame"></div>
      <div class="scan-hint">Point camera at QR code</div>
    </div>
    <div class="result-overlay" id="resultOverlay">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-msg" id="resultMsg"></div>
    </div>
  </div>
  <div class="manual-section">
    <div class="manual-input">
      <input type="text" id="manualToken" placeholder="Paste QR token or full URL manually..." />
      <button onclick="manualScan()">Scan</button>
    </div>
  </div>
</div>

<script>
// ─── PIN Logic ────────────────────────────────────────────────────────────────
let pinEntry = '';
let pinLength = 4; // default; updated after first successful status check

// Fetch the actual PIN length from the server so we know when to auto-submit
async function fetchPinLength() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    if (d.pinLength && d.pinLength >= 4 && d.pinLength <= 6) {
      pinLength = d.pinLength;
    }
  } catch(e) { /* use default 4 */ }
  renderPinDots();
}

function renderPinDots() {
  const container = document.getElementById('pinDots');
  container.innerHTML = '';
  for (let i = 0; i < pinLength; i++) {
    const dot = document.createElement('div');
    dot.className = 'pin-dot' + (i < pinEntry.length ? ' filled' : '');
    dot.id = 'd' + i;
    container.appendChild(dot);
  }
}

function pinPress(digit) {
  if (pinEntry.length >= pinLength) return;
  pinEntry += digit;
  renderPinDots();
  if (pinEntry.length === pinLength) verifyPin();
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  renderPinDots();
  document.getElementById('pinError').textContent = '';
}

async function verifyPin() {
  try {
    const r = await fetch('/api/verify-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pinEntry }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('scanScreen').style.display = 'flex';
      startCamera();
    } else {
      document.getElementById('pinError').textContent = data.error || 'Incorrect PIN';
      pinEntry = '';
      renderPinDots();
      const pad = document.querySelector('.pin-pad');
      pad.style.animation = 'none';
      setTimeout(() => { pad.style.animation = ''; }, 10);
    }
  } catch(e) {
    document.getElementById('pinError').textContent = 'Server error — check connection';
    pinEntry = '';
    renderPinDots();
  }
}

function lockScanner() {
  stopCamera();
  document.getElementById('scanScreen').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'flex';
  pinEntry = '';
  renderPinDots();
}

// ─── Camera / QR Logic ───────────────────────────────────────────────────────
let currentMode = 'bowling';
let scanning = false;
let stream = null;
let scanInterval = null;

function setMode(mode) {
  currentMode = mode;
  ['bowling', 'banquet', 'pool', 'guest-pool'].forEach(m => {
    const el = document.getElementById('tab-' + m);
    if (el) el.classList.toggle('active', m === mode);
  });
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    scanning = true;
    scanInterval = setInterval(scanFrame, 300);
  } catch(e) {
    alert('Camera access denied. Use manual token entry below.');
  }
}

function stopCamera() {
  scanning = false;
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function scanFrame() {
  if (!scanning) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if ('BarcodeDetector' in window) {
    const detector = new BarcodeDetector({ formats: ['qr_code'] });
    detector.detect(canvas).then(barcodes => {
      if (barcodes.length > 0) {
        handleScan(barcodes[0].rawValue);
      }
    }).catch(() => {});
  }
}

let resultTimeout = null;
let lastScanned = '';
let lastScannedTime = 0;

async function handleScan(rawValue) {
  const now = Date.now();
  if (rawValue === lastScanned && now - lastScannedTime < 3000) return;
  lastScanned = rawValue;
  lastScannedTime = now;
  await doScan(rawValue);
}

// Parse a raw scan value — accepts either a raw token string or a full URL
// like https://example.com/scan/pool/abc123 or /scan/banquet/abc123
function parseTokenAndType(rawValue) {
  const match = rawValue.match(/\/scan\/(pool|banquet|guest-pool|bowling)\/([a-f0-9]+)/i);
  if (match) {
    return { token: match[2], passportType: match[1].toLowerCase() };
  }
  return { token: rawValue.trim(), passportType: currentMode };
}

async function doScan(rawValue) {
  if (!rawValue.trim()) return;
  const { token, passportType } = parseTokenAndType(rawValue);
  try {
    const r = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, passportType, deviceId: 'doorman-tablet' }),
    });
    const data = await r.json();
    showResult(data);
  } catch(e) {
    showResult({ success: false, error: 'Server error: ' + e.message });
  }
}

function showResult(data) {
  const overlay = document.getElementById('resultOverlay');
  const icon = document.getElementById('resultIcon');
  const name = document.getElementById('resultName');
  const msg = document.getElementById('resultMsg');

  overlay.classList.remove('success', 'denied', 'already', 'disabled');

  if (data.success) {
    overlay.classList.add('success');
    icon.textContent = '✅';
    name.textContent = data.bowlerName || 'Admitted';
    msg.textContent = 'Entry granted';
  } else if (data.alreadyUsed) {
    overlay.classList.add('already');
    icon.textContent = '⚠️';
    name.textContent = data.bowlerName || 'Already Redeemed';
    msg.textContent = 'This pass was already used';
  } else if (data.disabled) {
    overlay.classList.add('disabled');
    icon.textContent = '⛔';
    name.textContent = 'Not Eligible';
    msg.textContent = 'This pass has been disabled by the Event Director';
  } else {
    overlay.classList.add('denied');
    icon.textContent = '❌';
    name.textContent = 'Access Denied';
    msg.textContent = data.error || 'Invalid QR code';
  }

  overlay.classList.add('show');
  if (resultTimeout) clearTimeout(resultTimeout);
  resultTimeout = setTimeout(() => {
    overlay.classList.remove('show');
    lastScanned = '';
  }, 2500);
}

function manualScan() {
  const val = document.getElementById('manualToken').value.trim();
  if (!val) return;
  doScan(val);
  document.getElementById('manualToken').value = '';
}

document.getElementById('manualToken').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') manualScan();
});

// Auto-lock after 10 minutes of inactivity
let inactivityTimer = null;
function resetInactivity() {
  if (inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => {
    if (document.getElementById('scanScreen').style.display !== 'none') {
      lockScanner();
    }
  }, 10 * 60 * 1000);
}
document.addEventListener('touchstart', resetInactivity);
document.addEventListener('click', resetInactivity);
resetInactivity();

// Initialize: fetch PIN length and render dots
fetchPinLength();
</script>
</body>
</html>
