<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>B.O.B. Roll-off Passport</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/manus-storage/logo-no-bg_c2fbc3b5.png" />
    <link rel="apple-touch-icon" href="/manus-storage/logo-no-bg_c2fbc3b5.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffd700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="B.O.B. Passport" />
    <script>
      // Register service worker only in production (not dev/preview)
      if ('serviceWorker' in navigator) {
        const isProd = location.hostname !== 'localhost' &&
                       location.hostname !== '127.0.0.1' &&
                       !location.hostname.includes('.manus.computer') &&
                       !location.hostname.includes('.manuspre.computer');
        if (isProd) {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        } else {
          // Unregister any stale SW in dev to prevent caching issues
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
