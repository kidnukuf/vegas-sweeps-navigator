<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>B.O.B. Roll-off Passport</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffd700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="B.O.B. Passport" />
    <script>
      // Register service worker only on real production domains (not dev/preview)
      if ('serviceWorker' in navigator) {
        const h = location.hostname;
        const isProd = h !== 'localhost' &&
                       h !== '127.0.0.1' &&
                       !h.includes('.manus.computer') &&
                       !h.includes('.manuspre.computer') &&
                       !h.includes('.manus.space');  // also skip Manus preview domains
        if (isProd) {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              // If a new SW is waiting, activate it immediately
              if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New SW installed — reload once to pick up fresh bundles
                      newWorker.postMessage('SKIP_WAITING');
                    }
                  });
                }
              });
            })
            .catch(() => {});
          // Reload the page once when the SW controller changes (new SW took over)
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) { refreshing = true; location.reload(); }
          });
        } else {
          // Unregister any stale SW in dev/preview to prevent caching issues
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
